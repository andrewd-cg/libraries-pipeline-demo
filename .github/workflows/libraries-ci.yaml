name: Libraries auth example

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  libraries-auth:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up chainctl and assume Chainguard identity
        uses: chainguard-dev/setup-chainctl@main
        with:
          identity: 9188682cf9821b6157bb8a00d8376efc4a2933e3/4cc653a7b108d929 #chainctl iam identities create github libraries-ci --github-repo=andrewd-cg/libraries-pipeline-demo --github-ref=refs/heads/main --role=libraries.javascript.pull

      - name: Get short-lived Libraries token
        id: libraries
        run: |
          TOKEN="$(chainctl auth token --audience=libraries.cgr.dev)"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Test with curl against Libraries
        run: |
          curl -sSf \
            -H "Authorization: Bearer ${{ steps.libraries.outputs.token }}" \
            https://libraries.cgr.dev/javascript/depd | jq .

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm install from Chainguard Libraries
        env:
          LIBRARIES_TOKEN: ${{ steps.libraries.outputs.token }}
        run: |
          cat > .npmrc <<EOF
          registry=https://libraries.cgr.dev/javascript/
          //libraries.cgr.dev/javascript/:_authToken=${LIBRARIES_TOKEN}
          always-auth=true
          EOF
          npm install --no-audit --no-fund
          npm ls depd

      - name: Show tarball sources from package-lock.json
        run: |
          echo "Resolved tarball URLs:"
          jq -r '
            .packages
            | to_entries[]
            | select(.value.resolved)
            | "\(.key | sub("^node_modules/"; ""))\t\(.value.resolved)"
          ' package-lock.json | column -t -s $'\t'

          {
            echo "## Tarball sources"
            echo
            echo "| Package | Resolved URL |"
            echo "| --- | --- |"
            jq -r '
              .packages
              | to_entries[]
              | select(.value.resolved)
              | "| \(.key | sub("^node_modules/"; "")) | \(.value.resolved) |"
            ' package-lock.json
          } >> "$GITHUB_STEP_SUMMARY"
